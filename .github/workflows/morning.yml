name: Morning — Generate + Publish Slot 1

# ~10:17 AM IST target = 4:47 AM UTC (odd offset avoids peak 00-04 UTC congestion window)
on:
  schedule:
    - cron: '47 4 * * *'
  workflow_dispatch:  # manual trigger for testing

jobs:
  morning-run:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit content_today.json back to the repo

    env:
      # Sensitive — stored in GitHub Secrets
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
      META_USER_ACCESS_TOKEN: ${{ secrets.META_USER_ACCESS_TOKEN }}
      META_PAGE_ACCESS_TOKEN: ${{ secrets.META_PAGE_ACCESS_TOKEN }}
      # The built-in GITHUB_TOKEN has write access to this repo (used for image uploads)
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Non-sensitive defaults (override by adding as GitHub Variables if needed)
      GITHUB_REPO: 'xhangreichris-max/mak-shang'
      GITHUB_POSTS_PATH: 'assets/posts'
      META_IG_USER_ID: '17841421839438768'
      META_PAGE_ID: '1139870945879021'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies (Puppeteer)
        run: npm ci

      - name: Install Puppeteer browser
        run: npx puppeteer browsers install chrome

      - name: Generate content_today.json (Steps 1–8 reasoning)
        run: python tools/run_reasoning.py

      - name: Render + upload + publish slot 1
        run: python tools/run_slot.py 1

      - name: Commit content_today.json
        run: |
          git config user.name "MAK-SHANG Bot"
          git config user.email "actions@github.com"
          git add content_today.json
          git diff --staged --quiet || git commit -m "chore: slot 1 published [skip ci]"
          git pull --rebase origin main
          git push
