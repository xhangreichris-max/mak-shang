<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MAK-SHANG Before / After</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=JetBrains+Mono:wght@400;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #0A0A0A;
    --red: #E02020;
    --bone: #F4F0E8;
    --dark: #111111;
    --muted: #6E6E6E;
  }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Space Grotesk', -apple-system, sans-serif;
  }

  .card {
    position: relative;
    width: 1080px;
    height: 1080px;
    background: var(--black);
    overflow: hidden;
  }

  /* ── SPLIT PANELS ── */
  .panels {
    position: absolute;
    inset: 0;
    display: flex;
  }

  .panel {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  .panel-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    display: block;
  }

  /* "Before" panel: muted/dated look via desaturation */
  .panel-before .panel-img {
    filter: grayscale(0.5) brightness(0.65) saturate(0.15);
  }

  /* Label chips — top position injected by render_before_after.py */
  .panel-label {
    position: absolute;
    top: 22px; /* overridden by inline style */
    left: 18px;
    background: var(--red);
    color: var(--bone);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    padding: 5px 13px;
    border-radius: 2px;
    z-index: 5;
  }

  /* Center red divider line */
  .divider {
    position: absolute;
    top: 0;
    bottom: 82px;
    left: 50%;
    width: 4px;
    background: var(--red);
    transform: translateX(-50%);
    z-index: 10;
  }

  /* ── OPTIONAL HEADLINE BAR ── */
  .headline-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    z-index: 20;
    background: rgba(10, 10, 10, 0.91);
    padding: 22px 52px;
    border-bottom: 3px solid var(--red);
    display: flex;
    align-items: center;
    gap: 18px;
  }

  .headline-text {
    font-family: 'Anton', Impact, sans-serif;
    font-size: 38px;
    color: var(--bone);
    letter-spacing: -0.3px;
    text-transform: uppercase;
    line-height: 1;
  }

  .headline-accent {
    color: var(--red);
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic;
    font-size: 42px;
    font-weight: 600;
    text-transform: none;
    letter-spacing: -1px;
  }

  /* ── SHARED FOOTER BAND ── */
  .footer-band {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 82px;
    background: rgba(10, 10, 10, 0.92);
    border-top: 3px solid var(--red);
    padding: 0 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 15;
  }

  .brand-logo {
    height: 36px;
    width: auto;
    object-fit: contain;
    filter: brightness(0) invert(1);
    opacity: 0.88;
  }

  .footer-right {
    text-align: right;
  }

  .footer-handle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: rgba(244, 240, 232, 0.68);
    letter-spacing: 1.2px;
  }

  .footer-tagline {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 14px;
    font-style: italic;
    color: rgba(244, 240, 232, 0.40);
    margin-top: 3px;
  }
</style>
</head>
<body>
<div class="card">

  <div class="panels">
    <div class="panel panel-before">
      <img class="panel-img" src="{{AFTER_IMAGE_URL}}" alt="">
      <div class="panel-label" style="top:{{PANEL_LABEL_TOP}}px;">AS IS</div>
    </div>
    <div class="panel panel-after">
      <img class="panel-img" src="{{AFTER_IMAGE_URL}}" alt="">
      <div class="panel-label" style="top:{{PANEL_LABEL_TOP}}px;">IMAGINED</div>
    </div>
  </div>

  <div class="divider"></div>

  {{HEADLINE_BLOCK}}

  <div class="footer-band">
    <img class="brand-logo" src="{{LOGO_URL}}" alt="MAK-SHANG Paints">
    <div class="footer-right">
      <div class="footer-handle">{{FOOTER_HANDLE}}</div>
      <div class="footer-tagline">{{FOOTER_TAGLINE}}</div>
    </div>
  </div>

</div>
</body>
</html>
