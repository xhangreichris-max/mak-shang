<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MAK-SHANG Infographic</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=JetBrains+Mono:wght@400;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #0A0A0A;
    --red: #E02020;
    --bone: #F4F0E8;
    --dark: #111111;
    --muted: #6E6E6E;
    --bone-dark: #E8E2D4;
  }

  body {
    font-family: 'Space Grotesk', -apple-system, sans-serif;
    background: var(--bone);
    width: 1080px;
    height: 1350px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card {
    width: 1080px;
    height: 1350px;
    background: var(--bone);
    padding: 72px 72px;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* Left red accent stripe */
  .card::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    width: 8px;
    height: 100%;
    background: var(--red);
  }

  /* ── TOP BAR ── */
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--black);
    color: var(--bone);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 7px 18px;
    border-radius: 2px;
  }

  .date-label {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 15px;
    font-style: italic;
    color: var(--muted);
  }

  /* ── HEADER ── */
  .header-block {
    text-align: left;
    margin-top: 44px;
    margin-bottom: 52px;
  }

  .title {
    font-family: 'Anton', Impact, sans-serif;
    font-size: 72px;
    color: var(--dark);
    line-height: 1.0;
    letter-spacing: -1px;
    text-transform: uppercase;
  }

  .title .accent {
    color: var(--red);
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic;
    font-size: 78px;
    font-weight: 600;
    text-transform: none;
    letter-spacing: -2px;
  }

  .subtitle {
    font-size: 18px;
    color: var(--muted);
    max-width: 820px;
    margin-top: 10px;
    line-height: 1.45;
    font-weight: 400;
  }

  /* ── RANKED BARS FORMAT ── */
  .content-bars {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-evenly;
    padding: 0 4px;
  }

  .bar-row {
    display: flex;
    flex-direction: column;
    gap: 7px;
  }

  .bar-info {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .bar-label {
    font-size: 16px;
    font-weight: 600;
    color: var(--dark);
    letter-spacing: -0.3px;
  }

  .bar-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    font-weight: 700;
    color: var(--dark);
  }

  .bar-track {
    width: 100%;
    height: 20px;
    background: var(--bone-dark);
    border-radius: 3px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 3px;
  }

  /* ── TAKEAWAY BOX (bars format) ── */
  .takeaway-box {
    border-left: 4px solid var(--red);
    padding: 12px 20px;
    background: var(--bone-dark);
  }

  .takeaway-text {
    font-size: 19px;
    color: var(--dark);
    font-weight: 500;
    line-height: 1.4;
  }

  .takeaway-text .takeaway-num {
    font-family: 'Anton', Impact, sans-serif;
    font-size: 26px;
    color: var(--red);
    letter-spacing: -0.5px;
  }

  /* ── HERO NUMBER FORMAT ── */
  .content-hero {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .hero-stat-row {
    display: flex;
    align-items: center;
    gap: 28px;
  }

  .hero-number {
    font-family: 'Anton', Impact, sans-serif;
    font-size: 168px;
    color: var(--red);
    line-height: 1;
    letter-spacing: -4px;
    flex-shrink: 0;
  }

  .hero-label {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 44px;
    font-style: italic;
    color: var(--dark);
    line-height: 1.2;
    max-width: 320px;
  }

  .checklist {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-evenly;
  }

  .checklist-item {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    font-size: 18px;
    color: var(--dark);
    font-weight: 500;
    line-height: 1.35;
  }

  .check-box {
    width: 22px;
    height: 22px;
    border: 2.5px solid var(--red);
    border-radius: 3px;
    flex-shrink: 0;
    margin-top: 1px;
  }

  /* ── CONTENT AREA ── */
  .content-area {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  /* ── FOOTER ── */
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    border-top: 1px solid var(--bone-dark);
    padding-top: 20px;
    margin-top: 48px;
  }

  .source {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  .brand-logo {
    height: 44px;
    width: auto;
    object-fit: contain;
  }
</style>
</head>
<body>
<div class="card">

  <div class="top-bar">
    <div class="badge">{{BADGE}}</div>
    <div class="date-label">{{DATE_LABEL}}</div>
  </div>

  <div class="header-block">
    <div class="title">{{TITLE_MAIN}} <span class="accent">{{TITLE_SPAN}}</span></div>
    <div class="subtitle">{{SUBTITLE}}</div>
  </div>

  <div class="content-area">
    {{CONTENT_BLOCK}}
  </div>

  <div class="footer">
    <div class="source">{{SOURCE}}</div>
    <img class="brand-logo" src="{{LOGO_URL}}" alt="MAK-SHANG Paints">
  </div>

</div>
</body>
</html>
