<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MAK-SHANG Finish Guide</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=JetBrains+Mono:wght@400;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #0A0A0A;
    --red: #E02020;
    --bone: #F4F0E8;
    --dark: #111111;
    --muted: #6E6E6E;
    --bone-dark: #E8E2D4;
  }

  body {
    font-family: 'Space Grotesk', -apple-system, sans-serif;
    background: var(--bone);
    width: 1080px;
    height: 1350px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card {
    width: 1080px;
    height: 1350px;
    background: var(--bone);
    padding: 72px 72px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
  }

  .card::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    width: 8px;
    height: 100%;
    background: var(--red);
  }

  /* ── TOP BAR ── */
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--black);
    color: var(--bone);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 7px 18px;
    border-radius: 2px;
  }

  .date-label {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 15px;
    font-style: italic;
    color: var(--muted);
  }

  /* ── HEADER ── */
  .header-block { text-align: left; margin-top: 20px; margin-bottom: 20px; }

  .title {
    font-family: 'Anton', Impact, sans-serif;
    font-size: 72px;
    color: var(--dark);
    line-height: 1.0;
    letter-spacing: -1px;
    text-transform: uppercase;
  }

  .title .accent {
    color: var(--red);
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic;
    font-size: 78px;
    font-weight: 600;
    text-transform: none;
    letter-spacing: -2px;
  }

  .subtitle {
    font-size: 18px;
    color: var(--muted);
    max-width: 820px;
    margin-top: 10px;
    line-height: 1.45;
    font-weight: 400;
  }

  /* ── SWATCH GRID ── */
  .swatch-grid {
    display: flex;
    gap: 20px;
    align-items: stretch;
    flex: 1;
    margin: 0;
  }

  .swatch-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    border-radius: 4px;
    overflow: hidden;
    min-width: 0;
  }

  .swatch-block {
    flex: 1;
    /* min-height set inline per column */
  }

  .swatch-info {
    background: var(--dark);
    padding: 14px 16px 16px;
  }

  .swatch-label {
    font-size: 14px;
    font-weight: 700;
    color: var(--bone);
    letter-spacing: 0.2px;
    line-height: 1.3;
  }

  .swatch-sublabel {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: rgba(244, 240, 232, 0.50);
    letter-spacing: 0.8px;
    margin-top: 5px;
    text-transform: uppercase;
  }

  /* ── OPTIONAL FOOTNOTE ── */
  .footnote {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.5px;
    padding-top: 10px;
    border-top: 1px dashed var(--bone-dark);
  }

  /* ── FOOTER ── */
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    border-top: 1px solid var(--bone-dark);
    padding-top: 20px;
  }

  .source {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  .brand-logo {
    height: 44px;
    width: auto;
    object-fit: contain;
  }
</style>
</head>
<body>
<div class="card">

  <div class="top-bar">
    <div class="badge">{{BADGE}}</div>
    <div class="date-label">{{DATE_LABEL}}</div>
  </div>

  <div class="header-block">
    <div class="title">{{TITLE_MAIN}} <span class="accent">{{TITLE_SPAN}}</span></div>
    <div class="subtitle">{{SUBTITLE}}</div>
  </div>

  <div class="swatch-grid">
    {{SWATCH_COLS}}
  </div>

  {{FOOTNOTE_BLOCK}}

  <div class="footer">
    <div class="source">{{SOURCE}}</div>
    <img class="brand-logo" src="{{LOGO_URL}}" alt="MAK-SHANG Paints">
  </div>

</div>
</body>
</html>
