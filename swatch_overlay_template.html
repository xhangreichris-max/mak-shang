<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MAK-SHANG Swatch Overlay</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=JetBrains+Mono:wght@400;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #0A0A0A;
    --red: #E02020;
    --bone: #F4F0E8;
    --dark: #111111;
    --muted: #6E6E6E;
  }

  body {
    width: 1080px;
    height: 1350px;
    overflow: hidden;
    font-family: 'Space Grotesk', -apple-system, sans-serif;
  }

  .card {
    position: relative;
    width: 1080px;
    height: 1350px;
    overflow: hidden;
  }

  /* Full-bleed background lifestyle photo */
  .bg-photo {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
  }

  /* Semi-opaque overlay panel anchored to bottom */
  .overlay-panel {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(10, 10, 10, 0.90);
    padding: 34px 52px 30px;
    display: flex;
    flex-direction: column;
    gap: 22px;
  }

  /* Left red accent stripe on the overlay */
  .overlay-panel::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 6px;
    background: var(--red);
  }

  .overlay-inner {
    display: flex;
    align-items: center;
    gap: 44px;
  }

  /* Color swatch block */
  .swatch-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .swatch-color {
    width: 84px;
    height: 84px;
    border: 2px solid rgba(244, 240, 232, 0.22);
    border-radius: 3px;
  }

  .swatch-name {
    font-size: 12px;
    font-weight: 700;
    color: var(--bone);
    text-align: center;
    letter-spacing: 0.4px;
    max-width: 96px;
    line-height: 1.3;
  }

  .swatch-ref {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: rgba(244, 240, 232, 0.45);
    letter-spacing: 1.2px;
    text-align: center;
  }

  /* Main headline */
  .headline {
    font-family: 'Anton', Impact, sans-serif;
    font-size: 56px;
    color: var(--bone);
    line-height: 1.0;
    letter-spacing: -0.5px;
    text-transform: uppercase;
    flex: 1;
  }

  /* Footer band within overlay */
  .footer-band {
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid rgba(244, 240, 232, 0.14);
    padding-top: 18px;
  }

  .brand-logo {
    height: 36px;
    width: auto;
    object-fit: contain;
    filter: brightness(0) invert(1);
    opacity: 0.88;
  }

  .footer-handle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: rgba(244, 240, 232, 0.52);
    letter-spacing: 1.2px;
  }
</style>
</head>
<body>
<div class="card">
  <img class="bg-photo" src="{{BG_IMAGE_URL}}" alt="">
  <div class="overlay-panel">
    <div class="overlay-inner">
      <div class="swatch-block">
        <div class="swatch-color" style="background:{{COLOR_HEX}};"></div>
        <div class="swatch-name">{{COLOR_NAME}}</div>
        <div class="swatch-ref">{{COLOR_REF}}</div>
      </div>
      <div class="headline">{{HEADLINE}}</div>
    </div>
    <div class="footer-band">
      <img class="brand-logo" src="{{LOGO_URL}}" alt="MAK-SHANG Paints">
      <div class="footer-handle">{{FOOTER_HANDLE}}</div>
    </div>
  </div>
</div>
</body>
</html>
